<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thousand Productions — Tour Date Tracker</title>
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #333;
    --text: #e8e8e8;
    --text-dim: #888;
    --fattmack: #FFD700;
    --fattmack-bg: rgba(255,215,0,0.12);
    --babyface: #C4A265;
    --babyface-bg: rgba(196,162,101,0.12);
    --rio: #FF4444;
    --rio-bg: rgba(255,68,68,0.12);
    --travis: #B366FF;
    --travis-bg: rgba(179,102,255,0.12);
    --realest: #00CED1;
    --realest-bg: rgba(0,206,209,0.12);
    --autumn: #FF7043;
    --autumn-bg: rgba(255,112,67,0.12);
    --smurf: #90A4AE;
    --smurf-bg: rgba(144,164,174,0.12);
    --yhapojj: #E91E63;
    --yhapojj-bg: rgba(233,30,99,0.12);
    --slimey: #76FF03;
    --slimey-bg: rgba(118,255,3,0.12);
    --dallas: #00E5FF;
    --texas: #FF6B35;
    --collision: #FF9500;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  header {
    background: linear-gradient(135deg, #111 0%, #1a1a1a 100%);
    border-bottom: 1px solid var(--border);
    padding: 24px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .logo span {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .stats-bar {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }

  .stat {
    text-align: center;
  }

  .stat-value {
    font-size: 28px;
    font-weight: 700;
  }

  .stat-label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .controls {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-group {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
  }

  .filter-group label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-right: 4px;
  }

  .filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .filter-btn:hover { background: var(--surface2); }

  .filter-btn.active {
    border-color: currentColor;
    background: rgba(255,255,255,0.08);
  }

  .filter-btn[data-tour="fattmack"] { color: var(--fattmack); }
  .filter-btn[data-tour="babyface"] { color: var(--babyface); }
  .filter-btn[data-tour="rio"] { color: var(--rio); }
  .filter-btn[data-tour="travis"] { color: var(--travis); }
  .filter-btn[data-tour="realest"] { color: var(--realest); }
  .filter-btn[data-tour="autumn"] { color: var(--autumn); }
  .filter-btn[data-tour="smurf"] { color: var(--smurf); }
  .filter-btn[data-tour="yhapojj"] { color: var(--yhapojj); }
  .filter-btn[data-tour="slimey"] { color: var(--slimey); }
  .filter-btn[data-highlight="dallas"] { color: var(--dallas); }
  .filter-btn[data-highlight="texas"] { color: var(--texas); }
  .filter-btn[data-highlight="collision"] { color: var(--collision); }

  .divider {
    width: 1px;
    height: 24px;
    background: var(--border);
    margin: 0 8px;
  }

  .view-toggle {
    margin-left: auto;
    display: flex;
    gap: 4px;
  }

  .view-btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .view-btn.active {
    background: var(--surface2);
    color: var(--text);
    border-color: #555;
  }

  main {
    padding: 32px;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* Calendar Grid View */
  .calendar-grid { display: flex; flex-direction: column; gap: 40px; }

  .month-block h2 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 12px;
    letter-spacing: 1px;
  }

  .month-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .day-header {
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 8px 4px;
  }

  .day-cell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    min-height: 100px;
    padding: 6px;
    position: relative;
    transition: all 0.2s;
  }

  .day-cell:hover { border-color: #555; }
  .day-cell.empty { background: transparent; border-color: transparent; }
  .day-cell.today { border-color: #fff; }

  .day-number {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  .day-cell.has-dallas {
    box-shadow: 0 0 0 2px var(--dallas), 0 0 12px rgba(0,229,255,0.25);
  }

  .day-cell.has-dallas .day-number { color: var(--dallas); }

  .day-cell.has-texas {
    border-left: 3px solid var(--texas);
  }

  .day-cell.has-collision {
    animation: pulse-collision 2s ease-in-out infinite;
  }

  @keyframes pulse-collision {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,149,0,0); }
    50% { box-shadow: 0 0 0 3px rgba(255,149,0,0.3); }
  }

  .day-cell.has-dallas.has-collision {
    animation: pulse-dallas-collision 2s ease-in-out infinite;
  }

  @keyframes pulse-dallas-collision {
    0%, 100% { box-shadow: 0 0 0 2px var(--dallas), 0 0 12px rgba(0,229,255,0.25); }
    50% { box-shadow: 0 0 0 2px var(--dallas), 0 0 12px rgba(0,229,255,0.25), 0 0 0 5px rgba(255,149,0,0.3); }
  }

  .event-chip {
    font-size: 10px;
    padding: 3px 6px;
    border-radius: 4px;
    margin-bottom: 3px;
    cursor: pointer;
    transition: all 0.15s;
    line-height: 1.3;
    position: relative;
  }

  .event-chip:hover { filter: brightness(1.3); transform: scale(1.02); }

  .event-chip[data-tour="fattmack"] { background: var(--fattmack-bg); color: var(--fattmack); border-left: 2px solid var(--fattmack); }
  .event-chip[data-tour="babyface"] { background: var(--babyface-bg); color: var(--babyface); border-left: 2px solid var(--babyface); }
  .event-chip[data-tour="rio"] { background: var(--rio-bg); color: var(--rio); border-left: 2px solid var(--rio); }
  .event-chip[data-tour="travis"] { background: var(--travis-bg); color: var(--travis); border-left: 2px solid var(--travis); }
  .event-chip[data-tour="realest"] { background: var(--realest-bg); color: var(--realest); border-left: 2px solid var(--realest); }
  .event-chip[data-tour="autumn"] { background: var(--autumn-bg); color: var(--autumn); border-left: 2px solid var(--autumn); }
  .event-chip[data-tour="smurf"] { background: var(--smurf-bg); color: var(--smurf); border-left: 2px solid var(--smurf); }
  .event-chip[data-tour="yhapojj"] { background: var(--yhapojj-bg); color: var(--yhapojj); border-left: 2px solid var(--yhapojj); }
  .event-chip[data-tour="slimey"] { background: var(--slimey-bg); color: var(--slimey); border-left: 2px solid var(--slimey); }

  .event-chip .sold-out {
    font-size: 8px;
    background: #ff3333;
    color: #fff;
    padding: 1px 4px;
    border-radius: 3px;
    margin-left: 4px;
    font-weight: 700;
  }

  .event-chip .low-tickets {
    font-size: 8px;
    background: #ff9500;
    color: #000;
    padding: 1px 4px;
    border-radius: 3px;
    margin-left: 4px;
    font-weight: 700;
  }

  .collision-badge {
    position: absolute;
    top: 4px;
    right: 4px;
    background: var(--collision);
    color: #000;
    font-size: 9px;
    font-weight: 800;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .dallas-star {
    position: absolute;
    top: 4px;
    right: 24px;
    font-size: 14px;
    color: var(--dallas);
  }

  .texas-flag {
    position: absolute;
    top: 5px;
    right: 24px;
    font-size: 11px;
  }

  /* List View */
  .list-view { display: none; }
  .list-view.active { display: block; }
  .calendar-grid.active { display: flex; }

  .list-month-header {
    font-size: 18px;
    font-weight: 600;
    padding: 16px 0 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
    margin-top: 24px;
  }

  .list-month-header:first-child { margin-top: 0; }

  .list-item {
    display: grid;
    grid-template-columns: 80px 160px 1fr 160px 120px;
    gap: 12px;
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 4px;
    align-items: center;
    transition: all 0.15s;
    border: 1px solid transparent;
  }

  .list-item:hover {
    background: var(--surface);
    border-color: var(--border);
  }

  .list-item.dallas-row {
    background: rgba(0,229,255,0.05);
    border-color: rgba(0,229,255,0.2);
  }

  .list-item.texas-row {
    border-left: 3px solid var(--texas);
  }

  .list-item.collision-row {
    background: rgba(255,149,0,0.05);
  }

  .list-date {
    font-weight: 600;
    font-size: 14px;
  }

  .list-artist {
    font-size: 13px;
    font-weight: 600;
  }

  .list-artist[data-tour="fattmack"] { color: var(--fattmack); }
  .list-artist[data-tour="babyface"] { color: var(--babyface); }
  .list-artist[data-tour="rio"] { color: var(--rio); }
  .list-artist[data-tour="travis"] { color: var(--travis); }
  .list-artist[data-tour="realest"] { color: var(--realest); }
  .list-artist[data-tour="autumn"] { color: var(--autumn); }
  .list-artist[data-tour="smurf"] { color: var(--smurf); }
  .list-artist[data-tour="yhapojj"] { color: var(--yhapojj); }
  .list-artist[data-tour="slimey"] { color: var(--slimey); }

  .list-city { font-size: 13px; color: var(--text); }
  .list-venue { font-size: 12px; color: var(--text-dim); }

  .list-badges {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
    white-space: nowrap;
  }

  .badge-dallas { background: rgba(0,229,255,0.15); color: var(--dallas); border: 1px solid rgba(0,229,255,0.3); }
  .badge-texas { background: rgba(255,107,53,0.15); color: var(--texas); border: 1px solid rgba(255,107,53,0.3); }
  .badge-collision { background: rgba(255,149,0,0.15); color: var(--collision); border: 1px solid rgba(255,149,0,0.3); }
  .badge-soldout { background: rgba(255,51,51,0.2); color: #ff5555; border: 1px solid rgba(255,51,51,0.3); }
  .badge-low { background: rgba(255,149,0,0.2); color: #ffaa00; border: 1px solid rgba(255,149,0,0.3); }

  /* Detail Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    justify-content: center;
    align-items: center;
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    max-width: 500px;
    width: 90%;
    position: relative;
  }

  .modal-close {
    position: absolute;
    top: 12px;
    right: 16px;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 20px;
    cursor: pointer;
  }

  .modal h3 { font-size: 18px; margin-bottom: 16px; }
  .modal-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .modal-row:last-child { border-bottom: none; }
  .modal-label { color: var(--text-dim); }

  /* Collision Panel */
  .collision-panel {
    background: var(--surface);
    border: 1px solid rgba(255,149,0,0.3);
    border-radius: 10px;
    padding: 20px 24px;
    margin-bottom: 32px;
  }

  .collision-panel h3 {
    font-size: 14px;
    color: var(--collision);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .collision-item {
    display: flex;
    gap: 12px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    align-items: flex-start;
  }

  .collision-item:last-child { border-bottom: none; }

  .collision-date {
    font-weight: 700;
    min-width: 80px;
    color: var(--collision);
  }

  .collision-artists {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  /* Responsive */
  @media (max-width: 900px) {
    .month-grid { grid-template-columns: repeat(7, 1fr); }
    .day-cell { min-height: 70px; padding: 4px; }
    .event-chip { font-size: 8px; padding: 2px 4px; }
    .list-item { grid-template-columns: 70px 1fr 1fr; }
    .list-venue, .list-badges { display: none; }
    main { padding: 16px; }
    header { padding: 16px; }
    .controls { padding: 12px 16px; }
  }

  .hidden { display: none !important; }

  .note-banner {
    background: rgba(0,206,209,0.08);
    border: 1px solid rgba(0,206,209,0.2);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 24px;
    font-size: 13px;
    color: var(--realest);
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div>
      <h1>Thousand Productions</h1>
      <span>Tour Date Tracker &mdash; 2026</span>
    </div>
  </div>
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-value" id="stat-total">0</div>
      <div class="stat-label">Total Shows</div>
    </div>
    <div class="stat">
      <div class="stat-value" style="color:var(--dallas)" id="stat-dallas">0</div>
      <div class="stat-label">Dallas</div>
    </div>
    <div class="stat">
      <div class="stat-value" style="color:var(--texas)" id="stat-texas">0</div>
      <div class="stat-label">Texas</div>
    </div>
    <div class="stat">
      <div class="stat-value" style="color:var(--collision)" id="stat-collisions">0</div>
      <div class="stat-label">Collisions</div>
    </div>
  </div>
</header>

<div class="controls">
  <div class="filter-group">
    <label>Artists</label>
    <button class="filter-btn active" data-tour="fattmack" onclick="toggleFilter(this)">Fattmack</button>
    <button class="filter-btn active" data-tour="babyface" onclick="toggleFilter(this)">Babyface Ray & 42 Dugg</button>
    <button class="filter-btn active" data-tour="rio" onclick="toggleFilter(this)">Rio Da Yung OG</button>
    <button class="filter-btn active" data-tour="travis" onclick="toggleFilter(this)">Chris Travis</button>
    <button class="filter-btn active" data-tour="realest" onclick="toggleFilter(this)">BabyFxce E</button>
    <button class="filter-btn active" data-tour="autumn" onclick="toggleFilter(this)">Autumn!</button>
    <button class="filter-btn active" data-tour="smurf" onclick="toggleFilter(this)">Black Smurf</button>
    <button class="filter-btn active" data-tour="yhapojj" onclick="toggleFilter(this)">Yhapojj</button>
    <button class="filter-btn active" data-tour="slimey" onclick="toggleFilter(this)">2Slimey</button>
  </div>
  <div class="divider"></div>
  <div class="filter-group">
    <label>Highlights</label>
    <button class="filter-btn" data-highlight="dallas" onclick="toggleHighlight(this)">Dallas Only</button>
    <button class="filter-btn" data-highlight="texas" onclick="toggleHighlight(this)">Texas Only</button>
    <button class="filter-btn" data-highlight="collision" onclick="toggleHighlight(this)">Collisions Only</button>
  </div>
  <div class="view-toggle">
    <button class="view-btn active" onclick="setView('calendar', this)">Calendar</button>
    <button class="view-btn" onclick="setView('list', this)">List</button>
  </div>
</div>

<main>
  <div class="note-banner" id="note-banner">
    <strong>Note:</strong> BabyFxce E "Be Da Realest Tour" dates sourced from Ticketmaster &amp; toursetlist.com. Rio Da Yung OG flyer was page 2/2 &mdash; earlier dates may exist.
  </div>

  <div id="collision-panel" class="collision-panel" style="display:none">
    <h3><span style="font-size:16px">&#9888;</span> Date Collisions</h3>
    <div id="collision-list"></div>
  </div>

  <div id="calendar-view" class="calendar-grid active"></div>
  <div id="list-view" class="list-view"></div>
</main>

<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <h3 id="modal-title"></h3>
    <div id="modal-body"></div>
  </div>
</div>

// Flatten all events
let allEvents = [];
TOURS.forEach(tour => {
  tour.dates.forEach(d => {
    allEvents.push({
      ...d,
      tourId: tour.id,
      artist: tour.artist,
      tourName: tour.tour,
      isDallas: d.city === 'Dallas',
      isTexas: d.state === 'TX',
    });
  });
});

// Find collisions (multiple artists on the same date)
const dateMap = {};
allEvents.forEach(e => {
  if (!dateMap[e.date]) dateMap[e.date] = [];
  dateMap[e.date].push(e);
});

const collisionDates = {};
Object.keys(dateMap).forEach(date => {
  const artists = [...new Set(dateMap[date].map(e => e.tourId))];
  if (artists.length > 1) collisionDates[date] = dateMap[date];
});

// State
let activeFilters = { fattmack: true, babyface: true, rio: true, travis: true, realest: true, autumn: true, smurf: true, yhapojj: true, slimey: true };
let activeHighlight = null;
let currentView = 'calendar';

// Stats
function updateStats() {
  const visible = allEvents.filter(e => activeFilters[e.tourId]);
  const filtered = activeHighlight
    ? visible.filter(e =>
        activeHighlight === 'dallas' ? e.isDallas :
        activeHighlight === 'texas' ? e.isTexas :
        activeHighlight === 'collision' ? !!collisionDates[e.date] : true)
    : visible;

  document.getElementById('stat-total').textContent = filtered.length;
  document.getElementById('stat-dallas').textContent = filtered.filter(e => e.isDallas).length;
  document.getElementById('stat-texas').textContent = filtered.filter(e => e.isTexas).length;

  const collisionCount = [...new Set(
    filtered.filter(e => collisionDates[e.date]).map(e => e.date)
  )].length;
  document.getElementById('stat-collisions').textContent = collisionCount;
}

// Filters
function toggleFilter(btn) {
  const tour = btn.dataset.tour;
  activeFilters[tour] = !activeFilters[tour];
  btn.classList.toggle('active');
  render();
}

function toggleHighlight(btn) {
  const hl = btn.dataset.highlight;
  if (activeHighlight === hl) {
    activeHighlight = null;
    btn.classList.remove('active');
  } else {
    document.querySelectorAll('[data-highlight]').forEach(b => b.classList.remove('active'));
    activeHighlight = hl;
    btn.classList.add('active');
  }
  render();
}

function setView(view, btn) {
  currentView = view;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

// Calendar rendering
function renderCalendar() {
  const container = document.getElementById('calendar-view');
  container.innerHTML = '';
  container.style.display = currentView === 'calendar' ? 'flex' : 'none';

  const months = [
    { year: 2026, month: 4, name: 'May 2026' },
    { year: 2026, month: 5, name: 'June 2026' },
    { year: 2026, month: 6, name: 'July 2026' },
    { year: 2026, month: 7, name: 'August 2026' },
    { year: 2026, month: 8, name: 'September 2026' },
  ];

  const today = new Date();
  const todayStr = today.toISOString().split('T')[0];

  months.forEach(({ year, month, name }) => {
    const block = document.createElement('div');
    block.className = 'month-block';
    block.innerHTML = `<h2>${name}</h2>`;

    const grid = document.createElement('div');
    grid.className = 'month-grid';

    ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => {
      const hdr = document.createElement('div');
      hdr.className = 'day-header';
      hdr.textContent = d;
      grid.appendChild(hdr);
    });

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    for (let i = 0; i < firstDay; i++) {
      const empty = document.createElement('div');
      empty.className = 'day-cell empty';
      grid.appendChild(empty);
    }

    for (let day = 1; day <= daysInMonth; day++) {
      const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const cell = document.createElement('div');
      cell.className = 'day-cell';

      if (dateStr === todayStr) cell.classList.add('today');

      const dayEvents = (dateMap[dateStr] || []).filter(e => activeFilters[e.tourId]);
      let show = true;
      if (activeHighlight === 'dallas') show = dayEvents.some(e => e.isDallas);
      if (activeHighlight === 'texas') show = dayEvents.some(e => e.isTexas);
      if (activeHighlight === 'collision') show = !!collisionDates[dateStr] && dayEvents.length > 1;

      if (activeHighlight && !show && dayEvents.length > 0) {
        cell.style.opacity = '0.25';
      }

      const hasDallas = dayEvents.some(e => e.isDallas);
      const hasTexas = dayEvents.some(e => e.isTexas);
      const uniqueTourIds = [...new Set(dayEvents.map(e => e.tourId))];
      const hasCollision = uniqueTourIds.length > 1;

      if (hasDallas) cell.classList.add('has-dallas');
      else if (hasTexas) cell.classList.add('has-texas');
      if (hasCollision) cell.classList.add('has-collision');

      let inner = `<div class="day-number">${day}</div>`;

      if (hasDallas) inner += `<span class="dallas-star" title="Dallas show">&#9733;</span>`;
      else if (hasTexas) inner += `<span class="texas-flag" title="Texas show">TX</span>`;

      if (hasCollision) inner += `<span class="collision-badge" title="${uniqueTourIds.length} artists">${uniqueTourIds.length}</span>`;

      dayEvents.forEach(e => {
        let statusHtml = '';
        if (e.status === 'sold_out') statusHtml = '<span class="sold-out">SOLD OUT</span>';
        else if (e.status === 'low_tickets') statusHtml = '<span class="low-tickets">LOW</span>';
        inner += `<div class="event-chip" data-tour="${e.tourId}" onclick="showDetail(event, '${e.date}', '${e.tourId}')">${e.artist.split(' ')[0]}${statusHtml}<br><span style="opacity:0.7">${e.city}, ${e.state}</span></div>`;
      });

      cell.innerHTML = inner;
      grid.appendChild(cell);
    }

    block.appendChild(grid);
    container.appendChild(block);
  });
}

// List rendering
function renderList() {
  const container = document.getElementById('list-view');
  container.innerHTML = '';
  container.style.display = currentView === 'list' ? 'block' : 'none';

  const sorted = [...allEvents]
    .filter(e => activeFilters[e.tourId])
    .sort((a, b) => a.date.localeCompare(b.date));

  let filtered = sorted;
  if (activeHighlight === 'dallas') filtered = sorted.filter(e => e.isDallas);
  if (activeHighlight === 'texas') filtered = sorted.filter(e => e.isTexas);
  if (activeHighlight === 'collision') filtered = sorted.filter(e => collisionDates[e.date]);

  let currentMonth = '';
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  filtered.forEach(e => {
    const d = new Date(e.date + 'T12:00:00');
    const monthKey = `${d.getFullYear()}-${d.getMonth()}`;
    if (monthKey !== currentMonth) {
      currentMonth = monthKey;
      const hdr = document.createElement('div');
      hdr.className = 'list-month-header';
      hdr.textContent = `${monthNames[d.getMonth()]} ${d.getFullYear()}`;
      container.appendChild(hdr);
    }

    const row = document.createElement('div');
    row.className = 'list-item';
    if (e.isDallas) row.classList.add('dallas-row');
    else if (e.isTexas) row.classList.add('texas-row');
    if (collisionDates[e.date]) row.classList.add('collision-row');

    const dateDisplay = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    let badges = '';
    if (e.isDallas) badges += '<span class="badge badge-dallas">DALLAS</span>';
    else if (e.isTexas) badges += '<span class="badge badge-texas">TEXAS</span>';
    if (collisionDates[e.date]) {
      const count = [...new Set(dateMap[e.date].map(x => x.tourId))].length;
      badges += `<span class="badge badge-collision">${count} ARTISTS</span>`;
    }
    if (e.status === 'sold_out') badges += '<span class="badge badge-soldout">SOLD OUT</span>';
    if (e.status === 'low_tickets') badges += '<span class="badge badge-low">LOW TICKETS</span>';

    row.innerHTML = `
      <div class="list-date">${dateDisplay}</div>
      <div class="list-artist" data-tour="${e.tourId}">${e.artist}</div>
      <div class="list-city">${e.city}, ${e.state}</div>
      <div class="list-venue">${e.venue || '—'}</div>
      <div class="list-badges">${badges}</div>
    `;

    row.style.cursor = 'pointer';
    row.onclick = () => showDetail(null, e.date, e.tourId);
    container.appendChild(row);
  });
}

// Collision panel
function renderCollisions() {
  const panel = document.getElementById('collision-panel');
  const list = document.getElementById('collision-list');

  const visibleCollisions = Object.entries(collisionDates).filter(([date, events]) => {
    const visible = events.filter(e => activeFilters[e.tourId]);
    const uniqueTours = [...new Set(visible.map(e => e.tourId))];
    return uniqueTours.length > 1;
  }).sort(([a],[b]) => a.localeCompare(b));

  if (visibleCollisions.length === 0) {
    panel.style.display = 'none';
    return;
  }

  panel.style.display = 'block';
  list.innerHTML = '';

  visibleCollisions.forEach(([date, events]) => {
    const visible = events.filter(e => activeFilters[e.tourId]);
    const d = new Date(date + 'T12:00:00');
    const dateStr = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });

    const item = document.createElement('div');
    item.className = 'collision-item';

    const hasDallas = visible.some(e => e.isDallas);
    const hasTexas = visible.some(e => e.isTexas);
    let flag = '';
    if (hasDallas) flag = ' <span style="color:var(--dallas)">&#9733; DALLAS</span>';
    else if (hasTexas) flag = ' <span style="color:var(--texas)">TX</span>';

    item.innerHTML = `
      <div class="collision-date">${dateStr}${flag}</div>
      <div class="collision-artists">
        ${visible.map(e => `<span style="color:var(--${e.tourId})">${e.artist} — ${e.city}, ${e.state}${e.venue ? ' @ ' + e.venue : ''}</span>`).join('')}
      </div>
    `;

    list.appendChild(item);
  });
}

// Modal
function showDetail(evt, date, tourId) {
  if (evt) evt.stopPropagation();
  const events = dateMap[date].filter(e => e.tourId === tourId);
  if (!events.length) return;
  const e = events[0];
  const tour = TOURS.find(t => t.id === tourId);
  const d = new Date(date + 'T12:00:00');

  document.getElementById('modal-title').textContent = `${e.artist}`;
  document.getElementById('modal-title').style.color = `var(--${tourId})`;

  let rows = `
    <div class="modal-row"><span class="modal-label">Tour</span><span>${tour.tour}</span></div>
    <div class="modal-row"><span class="modal-label">Date</span><span>${d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' })}</span></div>
    <div class="modal-row"><span class="modal-label">City</span><span>${e.city}, ${e.state}</span></div>
  `;
  if (e.venue) rows += `<div class="modal-row"><span class="modal-label">Venue</span><span>${e.venue}</span></div>`;

  if (e.status === 'sold_out') rows += `<div class="modal-row"><span class="modal-label">Status</span><span style="color:#ff3333;font-weight:700">SOLD OUT</span></div>`;
  else if (e.status === 'low_tickets') rows += `<div class="modal-row"><span class="modal-label">Status</span><span style="color:#ff9500;font-weight:700">LOW TICKETS</span></div>`;

  if (e.isDallas) rows += `<div class="modal-row"><span class="modal-label">Flag</span><span style="color:var(--dallas)">&#9733; Dallas Show</span></div>`;
  else if (e.isTexas) rows += `<div class="modal-row"><span class="modal-label">Flag</span><span style="color:var(--texas)">Texas Show</span></div>`;

  if (collisionDates[date]) {
    const others = collisionDates[date].filter(x => x.tourId !== tourId);
    if (others.length) {
      rows += `<div class="modal-row"><span class="modal-label">Same Date</span><span style="color:var(--collision)">${others.map(o => `${o.artist} (${o.city}, ${o.state})`).join(', ')}</span></div>`;
    }
  }

  if (tour.special) rows += `<div class="modal-row"><span class="modal-label">Notes</span><span style="color:var(--text-dim)">${tour.special}</span></div>`;
  if (e.uncertain) rows += `<div class="modal-row"><span class="modal-label">Accuracy</span><span style="color:var(--realest)">Unverified — low-res source</span></div>`;

  document.getElementById('modal-body').innerHTML = rows;
  document.getElementById('modal').classList.add('active');
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Main render
function render() {
  updateStats();
  renderCalendar();
  renderList();
  renderCollisions();
}

// On first load, jump the calendar to today (or the nearest upcoming month
// if today falls outside the rendered May–Sep 2026 window).
function scrollToToday() {
  if (currentView !== 'calendar') return;
  const todayCell = document.querySelector('.day-cell.today');
  if (todayCell) {
    todayCell.scrollIntoView({ block: 'center' });
    return;
  }
  const now = new Date();
  const blocks = document.querySelectorAll('.month-block');
  const rendered = [[2026,4],[2026,5],[2026,6],[2026,7],[2026,8]]; // May–Sep 2026
  let idx = rendered.findIndex(([y,m]) =>
    now.getFullYear() < y || (now.getFullYear() === y && now.getMonth() <= m));
  if (idx === -1) idx = blocks.length - 1; // past the window → last month
  if (blocks[idx]) blocks[idx].scrollIntoView({ block: 'start' });
}

render();
requestAnimationFrame(scrollToToday);
</script>
